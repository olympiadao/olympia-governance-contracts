[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = true

fs_permissions = [{ access = "read-write", path = "./samples" }]

[rpc_endpoints]
mordor = "${MORDOR_RPC_URL}"
etc = "${ETC_RPC_URL}"

[etherscan]
mordor = { key = "", url = "https://etc-mordor.blockscout.com/api" }
etc = { key = "", url = "https://etc.blockscout.com/api" }
